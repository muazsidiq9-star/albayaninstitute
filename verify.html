<!DOCTYPE html>
<html lang="en" translate="no">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <meta name="google" content="notranslate">
  <title>Document Verification | Al-Bayan Arabic Institute</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f5f7fa;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .card {
      width: 420px;
      background: white;
      border-radius: 14px;
      box-shadow: 0 10px 35px rgba(0,0,0,0.08);
      padding: 30px;
      box-sizing: border-box;
      text-align: center;
    }

    .header {
      border-bottom: 1px solid #eee;
      padding-bottom: 15px;
      margin-bottom: 25px;
    }

    .header img {
      width: 55px;
      margin-bottom: 8px;
    }

    .header h2 {
      margin: 5px 0;
      font-size: 18px;
      color: #0a3d62;
    }

    /* ✅ WATERMARK (true paper scaling) */
.watermark {
  position: absolute;
  width: 50%;
  opacity: 0.20;

  top: 60%;
  left: 50%;
  transform: translate(-50%, -50%);

  z-index: 0;
  pointer-events: none;
}

    .status-valid {
      color: #1e7e34;
      font-weight: bold;
      font-size: 18px;
      margin-bottom: 20px;
    }

    .status-invalid {
      color: #c82333;
      font-weight: bold;
      font-size: 18px;
      margin-bottom: 20px;
    }

    .info {
      text-align: left;
      margin-top: 20px;
      line-height: 1.8;
      font-size: 14px;
    }

    .label {
      font-weight: bold;
      color: #333;
    }

    .footer {
      margin-top: 25px;
      font-size: 12px;
      color: #666;
      border-top: 1px solid #eee;
      padding-top: 10px;
    }
  </style>
<link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
<link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
<link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
<link rel="manifest" href="/site.webmanifest">

<body>

<div class="card">
<img src="logo.png" class="watermark">
  <div class="header">
    <img src="logo.png">
    <h2>Al-Bayan Arabic Institute Online</h2>
    <div>Document Verification Portal</div>
  </div>

  <div id="result">Checking document...</div>

  <div class="footer">
    This verification confirms the authenticity of the admission record.
  </div>

</div>

<!-- SUPABASE -->
<script src="https://unpkg.com/@supabase/supabase-js@2"></script>

<script>
  const SUPABASE_URL = "https://cjrpjekmqrckozrbtwps.supabase.co";
  const SUPABASE_KEY = "sb_publishable_nR5kvC32lYVX0OflJM8sUA_tBaqRy1b";
  const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

  const params = new URLSearchParams(window.location.search);
  const doc = params.get("doc");

  if (!doc) {
    document.getElementById("result").innerHTML =
      '<div class="status-invalid">INVALID VERIFICATION LINK ❌</div>';
  } else {

    const matric = doc.split("-").pop();

    verifyDocument(matric);
  }

  async function verifyDocument(matric) {

    const { data, error } = await sb
      .from("students")
      .select("fullname, matric_number, level_arabic, country")
      .eq("matric_number", matric)
      .single();

    if (error || !data) {
      document.getElementById("result").innerHTML =
        '<div class="status-invalid">DOCUMENT NOT FOUND ❌</div>';
      return;
    }

    document.getElementById("result").innerHTML = `
      <div class="status-valid">DOCUMENT VERIFIED ✅</div>

      <div class="info">
        <div><span class="label">Full Name:</span> ${data.fullname}</div>
        <div><span class="label">Matric Number:</span> ${data.matric_number}</div>
        <div><span class="label">Programme:</span> ${data.level_arabic}</div>
        <div><span class="label">Country:</span> ${data.country || "N/A"}</div>
        <div><span class="label">Status:</span> Valid Admission Record</div>
      </div>
    `;
  }
</script>

</body>
</html>
